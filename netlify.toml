[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security Headers ──────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Force HTTPS for 1 year + preload
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Prevent XSS, inline scripts allowed for Vite
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cal.com https://app.cal.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cal.com https://app.cal.com; font-src 'self' https://fonts.gstatic.com https://cal.com https://app.cal.com data:; img-src 'self' data: blob: https://cal.com https://app.cal.com https://*.cal.com; connect-src 'self' https://*.supabase.co https://cal.com https://app.cal.com https://*.cal.com wss://*.cal.com; frame-src https://cal.com https://app.cal.com; frame-ancestors 'none';"
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Control referrer info
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
